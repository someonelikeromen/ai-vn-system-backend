<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧪 测试控制台 — 零度叙事系统</title>
<style>
  :root {
    --bg: #0d0f14; --bg2: #13161e; --bg3: #1a1e2a;
    --border: rgba(255,255,255,0.08);
    --text: #e2e8f0; --dim: #64748b; --sub: #94a3b8;
    --green: #34d399; --red: #f87171; --yellow: #fbbf24;
    --blue: #60a5fa; --purple: #a78bfa; --orange: #fb923c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  .header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 10;
  }
  .header h1 { font-size: 16px; font-weight: 700; }
  .header .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); }
  .header .status-dot.running { background: var(--yellow); animation: pulse 1s infinite; }
  .header .status-dot.passed { background: var(--green); }
  .header .status-dot.failed { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .layout { display: grid; grid-template-columns: 260px 1fr; height: calc(100vh - 53px); }

  /* Sidebar */
  .sidebar { background: var(--bg2); border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
  .sidebar-section { padding: 12px; border-bottom: 1px solid var(--border); }
  .sidebar-title { font-size: 10px; font-weight: 700; color: var(--dim); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }

  .btn { padding: 8px 16px; border: none; border-radius: 7px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all .15s; }
  .btn-primary { background: linear-gradient(135deg, #3b82f6, #7c3aed); color: #fff; width: 100%; margin-bottom: 6px; }
  .btn-primary:hover { opacity: .9; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .btn-ghost { background: rgba(255,255,255,0.04); color: var(--sub); border: 1px solid var(--border); width: 100%; margin-bottom: 4px; }
  .btn-ghost:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .btn-ghost.selected { background: rgba(96,165,250,0.12); color: var(--blue); border-color: rgba(96,165,250,0.3); }
  .btn-ghost.active-mod { border-left: 2px solid var(--blue); }

  .module-item { display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 11px; transition: background .1s; }
  .module-item:hover { background: rgba(255,255,255,0.04); }
  .module-item.checked { background: rgba(96,165,250,0.08); }
  .module-item input[type=checkbox] { accent-color: var(--blue); flex-shrink: 0; }
  .module-label { flex: 1; color: var(--sub); }
  .module-label b { color: var(--text); display: block; font-size: 10px; }

  /* Stats bar */
  .stats-bar { display: flex; gap: 8px; padding: 10px 12px; background: var(--bg3); border-bottom: 1px solid var(--border); }
  .stat { text-align: center; flex: 1; }
  .stat-val { font-size: 22px; font-weight: 800; }
  .stat-lbl { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: .06em; }
  .stat.green .stat-val { color: var(--green); }
  .stat.red .stat-val { color: var(--red); }
  .stat.yellow .stat-val { color: var(--yellow); }
  .stat.blue .stat-val { color: var(--blue); }

  /* Main content */
  .main { display: flex; flex-direction: column; overflow: hidden; }
  .main-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; }
  .tab { padding: 10px 18px; font-size: 12px; cursor: pointer; color: var(--dim); border-bottom: 2px solid transparent; transition: all .15s; }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

  .pane { flex: 1; overflow-y: auto; padding: 12px 16px; display: none; }
  .pane.active { display: block; }

  /* Test list */
  .test-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 10px; border-radius: 6px; margin-bottom: 4px;
    border: 1px solid var(--border); background: rgba(255,255,255,0.01);
    font-size: 12px; transition: background .1s;
  }
  .test-item:hover { background: rgba(255,255,255,0.03); }
  .test-status { width: 52px; font-size: 9px; font-weight: 700; text-align: center; padding: 2px 4px; border-radius: 4px; flex-shrink: 0; text-transform: uppercase; }
  .s-passed { background: rgba(52,211,153,.15); color: var(--green); }
  .s-failed, .s-error { background: rgba(248,113,113,.15); color: var(--red); }
  .s-skipped { background: rgba(251,191,36,.12); color: var(--yellow); }
  .s-running { background: rgba(96,165,250,.15); color: var(--blue); animation: pulse 1s infinite; }
  .test-info { flex: 1; min-width: 0; }
  .test-func { color: var(--text); font-weight: 500; }
  .test-module { color: var(--dim); font-size: 10px; margin-top: 1px; }
  .test-time { font-size: 10px; color: var(--dim); flex-shrink: 0; }
  .test-detail { margin-top: 6px; padding: 6px 8px; background: rgba(248,113,113,.05); border-radius: 4px; font-size: 10px; color: var(--red); white-space: pre-wrap; font-family: monospace; }

  /* Log pane */
  .log-box { background: #080a10; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 11px; line-height: 1.7; min-height: 200px; }
  .log-passed { color: var(--green); }
  .log-failed, .log-error { color: var(--red); }
  .log-skipped { color: var(--yellow); }
  .log-normal { color: #7c8fa3; }
  .log-sep { color: #2d3748; }

  /* Progress bar */
  .progress-wrap { height: 4px; background: var(--bg3); border-radius: 2px; margin: 8px 12px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #3b82f6, #7c3aed); border-radius: 2px; transition: width .3s; }

  /* Module filter pills */
  .filter-row { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .pill { padding: 2px 8px; border-radius: 12px; font-size: 10px; cursor: pointer; border: 1px solid var(--border); color: var(--dim); }
  .pill.active { background: rgba(96,165,250,.15); color: var(--blue); border-color: rgba(96,165,250,.3); }

  .empty { text-align: center; color: var(--dim); padding: 40px; font-size: 13px; }
  .badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 9px; font-weight: 700; }
  .elapsed { font-size: 10px; color: var(--dim); padding: 4px 12px; }
</style>
</head>
<body>

<div class="header">
  <div class="status-dot" id="statusDot"></div>
  <h1>🧪 测试控制台</h1>
  <span style="color:var(--dim);font-size:11px;flex:1" id="headerMsg">就绪</span>
  <span style="font-size:10px;color:var(--dim)" id="elapsedBadge"></span>
  <a href="/" style="font-size:11px;color:var(--blue);text-decoration:none;margin-left:8px">← 返回主界面</a>
</div>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">运行模式</div>
      <button class="btn btn-primary" id="btnRunAll" onclick="runTests(false)">▶ 运行全部测试</button>
      <button class="btn btn-ghost" onclick="runTests(true)">⚡ 快速模式（跳过集成）</button>
      <button class="btn btn-ghost" id="btnRunSel" onclick="runSelected()" style="display:none">✅ 运行已选模块</button>
    </div>

    <div class="sidebar-section" style="flex:1;overflow-y:auto">
      <div class="sidebar-title">选择模块</div>
      <div id="moduleList">加载中…</div>
    </div>

    <div class="sidebar-section">
      <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);cursor:pointer">
        <input type="checkbox" id="chkStopFirst"> 首次失败即停止
      </label>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="stats-bar">
      <div class="stat blue"><div class="stat-val" id="sTotal">—</div><div class="stat-lbl">总计</div></div>
      <div class="stat green"><div class="stat-val" id="sPassed">—</div><div class="stat-lbl">通过</div></div>
      <div class="stat red"><div class="stat-val" id="sFailed">—</div><div class="stat-lbl">失败</div></div>
      <div class="stat yellow"><div class="stat-val" id="sSkipped">—</div><div class="stat-lbl">跳过</div></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>

    <div class="main-tabs">
      <div class="tab active" onclick="switchTab('results')">📋 测试结果</div>
      <div class="tab" onclick="switchTab('log')">📜 实时日志</div>
      <div class="tab" onclick="switchTab('failed')">❌ 失败详情</div>
    </div>

    <div class="filter-row" id="filterRow" style="display:none">
      <span class="pill active" onclick="setFilter('all',this)">全部</span>
      <span class="pill" onclick="setFilter('passed',this)">✓ 通过</span>
      <span class="pill" onclick="setFilter('failed',this)">✗ 失败</span>
      <span class="pill" onclick="setFilter('skipped',this)">⊘ 跳过</span>
    </div>

    <div class="pane active" id="pane-results">
      <div class="empty" id="emptyResults">👆 点击左侧按钮开始测试</div>
      <div id="resultList"></div>
    </div>

    <div class="pane" id="pane-log">
      <div class="log-box" id="logBox"></div>
    </div>

    <div class="pane" id="pane-failed">
      <div class="empty" id="emptyFailed">暂无失败用例</div>
      <div id="failedList"></div>
    </div>
  </div>
</div>

<script>
const API = '';
let allTests = [];
let currentFilter = 'all';
let runningTimer = null;
let runStartTime = 0;
let totalExpected = 0;
let checkedModules = new Set();

// ── 初始化：加载模块列表 ──
async function loadModules() {
  try {
    const r = await fetch(`${API}/api/tests/modules`);
    const data = await r.json();
    const el = document.getElementById('moduleList');
    el.innerHTML = '';
    (data.modules || []).forEach(m => {
      const d = document.createElement('div');
      d.className = 'module-item';
      d.innerHTML = `
        <input type="checkbox" id="cb_${m.name}" onchange="toggleModule('${m.name}',this.checked)">
        <label for="cb_${m.name}" class="module-label" style="cursor:pointer">
          <b>${m.name.replace('test_','')}</b>
          ${m.description ? m.description.slice(0,40) : ''}
        </label>`;
      el.appendChild(d);
    });
    totalExpected = data.count;
  } catch(e) {
    document.getElementById('moduleList').textContent = '加载失败';
  }
}

function toggleModule(name, checked) {
  if(checked) checkedModules.add(name);
  else checkedModules.delete(name);
  document.getElementById('btnRunSel').style.display = checkedModules.size > 0 ? '' : 'none';
}

// ── 运行测试 ──
async function runTests(fast=false, modules=[]) {
  if(document.getElementById('btnRunAll').disabled) return;
  startUI();
  const body = { modules, stop_on_first_failure: document.getElementById('chkStopFirst').checked, fast };
  await streamRun(body);
}

async function runSelected() {
  if(checkedModules.size === 0) return;
  startUI();
  const body = { modules: [...checkedModules], stop_on_first_failure: document.getElementById('chkStopFirst').checked };
  await streamRun(body);
}

async function streamRun(body) {
  const res = await fetch(`${API}/api/tests/run`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  while(true) {
    const {done, value} = await reader.read();
    if(done) break;
    buf += dec.decode(value, {stream:true});
    const lines = buf.split('\n');
    buf = lines.pop();
    for(const l of lines) {
      if(l.startsWith('data: ')) {
        try { handleEvent(JSON.parse(l.slice(6))); } catch{}
      }
    }
  }
  endUI();
}

// ── 事件处理 ──
function handleEvent(ev) {
  switch(ev.type) {
    case 'start':
      setHeader('运行中…', 'running');
      addLog(`▶ 开始测试：${ev.modules.join(', ')}`, 'normal');
      break;

    case 'item_result': {
      const t = {
        test_id: ev.test_id, module: ev.module || '', func: ev.func || ev.test_id,
        status: ev.status, time: ev.time || 0, detail: ev.detail || '',
      };
      allTests.push(t);
      renderTestItem(t);
      updateStats();
      updateProgress();
      addLog(ev.line, ev.status);
      if(ev.status === 'failed' || ev.status === 'error') addFailed(t);
      break;
    }

    case 'log_line':
      if(ev.line.trim()) addLog(ev.line, 'normal');
      break;

    case 'summary': {
      const ok = ev.status === 'passed';
      setHeader(ok ? `✓ 全部通过 (${ev.elapsed}s)` : `✗ ${ev.failed} 项失败 (${ev.elapsed}s)`, ev.status);
      document.getElementById('sTotal').textContent   = ev.total;
      document.getElementById('sPassed').textContent  = ev.passed;
      document.getElementById('sFailed').textContent  = ev.failed;
      document.getElementById('sSkipped').textContent = ev.skipped;
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressBar').style.background = ok ? '#34d399' : '#f87171';
      addLog(`\n${'─'.repeat(40)}\n结果: ${ev.passed}✓ ${ev.failed}✗ ${ev.skipped}⊘  耗时 ${ev.elapsed}s`, ok ? 'passed' : 'failed');
      break;
    }

    case 'error':
      addLog(`⚠ ${ev.message}`, 'error');
      setHeader('运行出错', 'failed');
      break;
  }
}

// ── UI 状态 ──
function startUI() {
  allTests = [];
  document.getElementById('resultList').innerHTML = '';
  document.getElementById('logBox').innerHTML = '';
  document.getElementById('failedList').innerHTML = '';
  document.getElementById('emptyResults').style.display = 'none';
  document.getElementById('emptyFailed').style.display = 'none';
  document.getElementById('filterRow').style.display = '';
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('progressBar').style.background = 'linear-gradient(90deg,#3b82f6,#7c3aed)';
  document.getElementById('btnRunAll').disabled = true;
  document.getElementById('btnRunSel').disabled = true;
  setHeader('运行中…', 'running');
  runStartTime = Date.now();
  runningTimer = setInterval(() => {
    document.getElementById('elapsedBadge').textContent = `${((Date.now()-runStartTime)/1000).toFixed(1)}s`;
  }, 200);
}

function endUI() {
  clearInterval(runningTimer);
  document.getElementById('btnRunAll').disabled = false;
  document.getElementById('btnRunSel').disabled = false;
}

function setHeader(msg, state) {
  document.getElementById('headerMsg').textContent = msg;
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + (state === 'running' ? 'running' : state === 'passed' ? 'passed' : state === 'failed' ? 'failed' : '');
}

function updateStats() {
  const p = allTests.filter(t=>t.status==='passed').length;
  const f = allTests.filter(t=>t.status==='failed'||t.status==='error').length;
  const s = allTests.filter(t=>t.status==='skipped').length;
  document.getElementById('sTotal').textContent   = allTests.length;
  document.getElementById('sPassed').textContent  = p;
  document.getElementById('sFailed').textContent  = f;
  document.getElementById('sSkipped').textContent = s;
}

function updateProgress() {
  if(totalExpected > 0) {
    document.getElementById('progressBar').style.width = Math.min(100, allTests.length / totalExpected * 95) + '%';
  }
}

// ── 渲染 ──
function renderTestItem(t) {
  if(currentFilter !== 'all' && t.status !== currentFilter) return;
  const el = document.createElement('div');
  el.className = 'test-item';
  el.id = 'ti_' + t.test_id.replace(/[^a-zA-Z0-9]/g,'_');
  el.innerHTML = `
    <span class="test-status s-${t.status}">${t.status}</span>
    <div class="test-info">
      <div class="test-func">${t.func}</div>
      <div class="test-module">${t.module}</div>
      ${t.detail ? `<div class="test-detail">${esc(t.detail)}</div>` : ''}
    </div>
    <span class="test-time">${t.time ? t.time.toFixed(2)+'s' : ''}</span>`;
  document.getElementById('resultList').appendChild(el);
}

function addFailed(t) {
  document.getElementById('emptyFailed').style.display = 'none';
  const el = document.createElement('div');
  el.className = 'test-item';
  el.innerHTML = `
    <span class="test-status s-failed">FAIL</span>
    <div class="test-info">
      <div class="test-func">${t.func}</div>
      <div class="test-module">${t.module}</div>
      ${t.detail ? `<div class="test-detail">${esc(t.detail)}</div>` : ''}
    </div>`;
  document.getElementById('failedList').appendChild(el);
}

function addLog(line, status) {
  const box = document.getElementById('logBox');
  const s = document.createElement('div');
  const cls = status === 'passed' ? 'log-passed' : (status === 'failed' || status === 'error') ? 'log-failed' : status === 'skipped' ? 'log-skipped' : line.startsWith('─') || line.startsWith('=') ? 'log-sep' : 'log-normal';
  s.className = cls;
  s.textContent = line;
  box.appendChild(s);
  box.scrollTop = box.scrollHeight;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── 过滤 ──
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-row .pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('resultList').innerHTML = '';
  allTests.forEach(t => { if(f==='all'||t.status===f||(f==='failed'&&t.status==='error')) renderTestItem(t); });
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>{ t.classList.toggle('active', ['results','log','failed'][i]===name); });
  document.querySelectorAll('.pane').forEach(p=>{ p.classList.toggle('active', p.id==='pane-'+name); });
  document.getElementById('filterRow').style.display = name==='results' ? '' : 'none';
}

// ── 加载最近报告 ──
async function loadLastReport() {
  try {
    const r = await fetch(`${API}/api/tests/last-report`);
    const d = await r.json();
    if(d.status && d.status !== 'no_report') {
      document.getElementById('sTotal').textContent   = d.total  || '—';
      document.getElementById('sPassed').textContent  = d.passed || '—';
      document.getElementById('sFailed').textContent  = d.failed || '—';
      document.getElementById('sSkipped').textContent = d.skipped|| '—';
      setHeader(`上次：${d.status} (${d.elapsed||0}s)`, d.status);
      if(d.tests) {
        allTests = d.tests;
        d.tests.forEach(t => renderTestItem(t));
        document.getElementById('emptyResults').style.display = 'none';
        document.getElementById('filterRow').style.display = '';
        d.tests.filter(t=>t.status==='failed'||t.status==='error').forEach(t=>addFailed(t));
      }
    }
  } catch{}
}

loadModules();
loadLastReport();
</script>
</body>
</html>
